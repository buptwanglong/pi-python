[tool.poetry]
name = "basket-eval"
version = "0.1.0"
description = "Evaluation framework for basket AI agents"
authors = ["Pi Python Team"]
readme = "README.md"
packages = [{include = "basket_eval"}]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[tool.poetry.dependencies]
python = "^3.12"
pydantic = "^2.7"
basket-trajectory = {path = "../basket-trajectory", develop = true}
basket-ai = {path = "../basket-ai", develop = true, optional = true}

[tool.poetry.extras]
judge = ["basket-ai"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-asyncio = "^0.23.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
