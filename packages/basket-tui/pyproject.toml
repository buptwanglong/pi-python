[tool.poetry]
name = "basket-tui"
version = "0.1.0"
description = "Terminal-native TUI for Basket (line output + prompt_toolkit)"
authors = ["Pi Team"]
readme = "README.md"
packages = [{include = "basket_tui"}]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[tool.poetry.dependencies]
python = "^3.12"
basket-protocol = {path = "../basket-protocol", develop = true}
prompt_toolkit = "^3.0"
rich = "^13.0"
websockets = "^14.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pytest-asyncio = "^0.23.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
